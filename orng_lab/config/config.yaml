project:
  name: ORNG
  mode: research_only

data:
  source: yfinance
  assets:
    - SPY
    - QQQ
    - IWM
  start_date: 2010-01-01
  frequency: 1D

strategy:
  type: moving_average_trend
  fast_window: 20
  slow_window: 100

risk:
  max_exposure: 1.0
  target_volatility: 0.01
  stop_loss: 0.15

validation:
  train_split: 0.7
  walk_forward_windows: 5
  monte_carlo_runs: 500

output:
  save_reports: true
  path: publication/
